services:
  nginx:
    image: nginx:alpine
    ports:
      - '8090:80'
      - '8443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
  llm:
    platform: linux/amd64
    image: vllm/vllm-openai:v0.11.2
    container_name: llm
    expose:
      - "8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HUGGING_FACE_CACHE_DIR=${HUGGING_FACE_CACHE_DIR}
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    ipc: host
    volumes:
      - ${HUGGING_FACE_CACHE_DIR}:/root/.cache/huggingface
    command: >
      Qwen/Qwen3-32B-AWQ
      --port 8000
      --max-model-len 10000
      --max-num-seqs 1
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.95
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --tensor-parallel-size 1
      --reasoning-parser qwen3
      --uvicorn-log-level warning
      --disable-log-requests
  faster_whisper:
    image: quay.io/ktbs/fd-itbs/faster-whisper:v1.4.1
    ports:
      - "50001:50001"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    deploy:
      resources:
        reservations:
          memory: 16g
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
  docling:
    image: quay.io/docling-project/docling-serve-cu124:v1.1.0
    container_name: docling
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    ports:
      - "8004:5001"
    environment:
      - DOCLING_MODELS_PATH=/models
      - DOCLING_CONFIG_FILE=/app/docling_config.json
      - DOCLING_SERVE_ENABLE_UI=true
    volumes:
      - "${HOME}/.cache/docling:/models"
      - ./docling_config.json:/app/docling_config.json:ro
  translator-backend:
    image: ghcr.io/dcc-bs/bs-translator-backend:latest
    expose:
      - "8000"
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - LLM_KEY=${LLM_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_HEALTH_CHECK_URL=${LLM_HEALTH_CHECK_URL}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_FRONTEND_CLIENT_ID=${AZURE_FRONTEND_CLIENT_ID:-}
      - SCOPE_DESCRIPTION=${SCOPE_DESCRIPTION:-}
      - HMAC_SECRET=${HMAC_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
      - PORT=${BACKEND_PORT}
  translator-frontend:
    container_name: translator-frontend
    build:
      context: ..
      dockerfile: ../Dockerfile
    environment:
      - NUXT_API_URL=http://translator-backend:8000
      - PORT=3000
    expose:
      - 3000
