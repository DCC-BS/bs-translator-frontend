name: Build and Publish Docker Image
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: DCC-BS/ci-workflows/.github/workflows/publish-docker.yml@6d1cca8023e197f6e9cda5e64f3b3f0448f4cf6e # v9
    secrets: inherit
    with:
      project_type: "node" # or "python"
      registry: ghcr.io
      image_name: ghcr.io/${{ github.repository }}
      context: .
      dockerfile: ./Dockerfile
      platforms: linux/amd64
      push: true
