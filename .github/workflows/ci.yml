name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  LOGGER_LAYER_URI: github:DCC-BS/nuxt-layers/pino-logger
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: DCC-BS/ci-workflows/actions/node-bun-biome-playwright@6d1cca8023e197f6e9cda5e64f3b3f0448f4cf6e # v9
        with:
          node_version: "24.x"
          working_directory: "."
          run_biome: "true"
          biome_version: "2.4.15"
          run_playwright: "true"
          install_method: "bun"
          build_command: "DUMMY=true bun run build"
          test_command: "bun run test:e2e"
          artifact_name: "playwright-report"
          artifact_retention_days: 30
